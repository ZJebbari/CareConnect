<section class="set-password-page">
  <div class="set-password-card">
    <h1>Set / Reset Password</h1>
    <p class="description">
      For internally provisioned accounts (Admin or Personnel). Use your current credentials to set a new password.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Current Password</mat-label>
        <input matInput type="password" formControlName="currentPassword" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput type="password" formControlName="newPassword" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm New Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword" />
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        class="full-width"
        type="submit"
        [disabled]="loading || form.invalid"
      >
        {{ loading ? 'Updating...' : 'Update Password' }}
      </button>

      <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
    </form>

    <a routerLink="/login" class="back-link">Back to Login</a>
  </div>
</section>
