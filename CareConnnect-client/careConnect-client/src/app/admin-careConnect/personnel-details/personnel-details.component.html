<div class="expansion-panel-container">
  <div class="expansion-panel-section mat-elevation-z3">
    <div class="expansion-panel-content-container">
      <div class="expansion-panel-content">
        <mat-form-field appearance="outline">
          <mat-label>Full Name</mat-label>
          <input matInput name="fullName" type="text" [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput name="email" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput name="phone" type="text" [ngModel]="phone()" (ngModelChange)="phone.set($event)" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Role</mat-label>
          <mat-select [ngModel]="roleID()" (ngModelChange)="roleID.set($event)">
            <mat-option [value]="3">Support</mat-option>
            <mat-option [value]="4">Personnel</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ isCreateMode() ? 'Password' : 'New Password (Optional)' }}</mat-label>
          <input matInput name="password" type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" />
        </mat-form-field>
      </div>

      <div class="expansion-panel-content">
        @if (isCreateMode()) {
          <button mat-flat-button color="primary" class="standard-button" (click)="createPersonnel()" [disabled]="!canCreate()">
            Create Personnel
          </button>
        } @else {
          <button mat-flat-button color="warn" class="standard-button" (click)="deletePersonnel()">
            Delete Personnel
          </button>
          <button mat-flat-button color="primary" class="standard-button" (click)="updatePersonnel()" [disabled]="!isDirty()">
            Update Personnel
          </button>
        }
      </div>
    </div>
  </div>
</div>
